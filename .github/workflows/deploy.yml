name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual re-deployment from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel any in-progress run to avoid stale deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          sed -i "s|__OPENAI_API_KEY__|${OPENAI_API_KEY}|g" analyze/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository root (all static files)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
