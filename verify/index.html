<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GuildSafe Wallet Verify</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22c55e;
      --accent2: #0ea5e9;
      --danger: #ef4444;
      --border: #334155;
    }
    body {
      margin: 0;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, Arial, sans-serif;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    h2 { margin: 0 0 8px 0; font-size: 20px; }
    p { margin: 8px 0; color: var(--muted); }
    .pill {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #1f2937;
      border: 1px solid var(--border);
      display: inline-block;
      margin-right: 8px;
    }
    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #0f172a;
      border: 1px solid var(--border);
      font-size: 14px;
      text-align: center;
    }
    #walletAddress {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #0f172a;
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--accent2);
      word-break: break-all;
      display: none;
    }
    button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: none;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      display: none;
    }
    .btn-retry { background: var(--accent2); color: #062033; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--muted);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h2>GuildSafe Wallet Verification</h2>
    <p>Select your Sui wallet to verify token holdings.</p>

    <div>
      <span class="pill" id="ctxGroup">group: -</span>
      <span class="pill" id="ctxUser">user: -</span>
    </div>

    <div id="status"><span class="spinner"></span> Connecting to wallet&hellip;</div>
    <div id="walletAddress"></div>
    <button class="btn-retry" id="retryBtn">Retry</button>
  </div>

  <script>
    // ---------- Telegram context ----------
    const tg = window.Telegram?.WebApp || null;
    if (tg) tg.ready();

    const qs = new URLSearchParams(window.location.search);
    const groupId = qs.get('group_id') || '';
    const tgUserId = qs.get('tg_user_id') || '';

    document.getElementById('ctxGroup').textContent = `group: ${groupId || '-'}`;
    document.getElementById('ctxUser').textContent = `user: ${tgUserId || '-'}`;

    // ---------- UI refs ----------
    const statusEl = document.getElementById('status');
    const walletAddressEl = document.getElementById('walletAddress');
    const retryBtn = document.getElementById('retryBtn');

    function setStatus(html) { statusEl.innerHTML = html; }
    function showRetry() { retryBtn.style.display = 'block'; }

    // ---------- Helpers ----------
    function detectProvider() {
      const candidates = [
        { name: 'slush', obj: window.slush?.sui || window.slush },
        { name: 'suiWallet', obj: window.suiWallet },
        { name: 'sui', obj: window.sui },
        { name: 'martian', obj: window.martian?.sui || window.martian },
        { name: 'ethos', obj: window.ethos?.sui || window.ethos },
      ].filter(c => !!c.obj);

      if (!candidates.length) return null;
      return candidates[0];
    }

    function isValidSuiAddress(a) {
      return /^0x[0-9a-fA-F]{40,64}$/.test((a || '').trim());
    }

    // ---------- Main verification flow ----------
    async function verify() {
      retryBtn.style.display = 'none';
      setStatus('<span class="spinner"></span> Connecting to wallet&hellip;');

      // 1. Detect & connect wallet
      const found = detectProvider();
      if (!found) {
        setStatus('&#x26A0;&#xFE0F; No Sui wallet found. Please open this page in a wallet-enabled browser.');
        showRetry();
        return;
      }

      const walletProvider = found.obj;

      if (typeof walletProvider.connect === 'function') {
        await walletProvider.connect();
      }

      // 2. Get wallet address
      let addr = null;
      if (typeof walletProvider.getAccounts === 'function') {
        const accts = await walletProvider.getAccounts();
        addr = accts?.[0]?.address || accts?.[0];
      }
      if (!addr && Array.isArray(walletProvider.accounts)) {
        addr = walletProvider.accounts?.[0]?.address || walletProvider.accounts?.[0];
      }
      if (!addr && typeof walletProvider.account === 'string') {
        addr = walletProvider.account;
      }

      if (!addr || !isValidSuiAddress(addr)) {
        setStatus('&#x26A0;&#xFE0F; Wallet did not provide a valid Sui address.');
        showRetry();
        return;
      }

      const address = String(addr).trim();
      walletAddressEl.textContent = address;
      walletAddressEl.style.display = 'block';

      // 3. Submit wallet address to Telegram bot for token-balance verification
      setStatus('<span class="spinner"></span> Submitting for verification&hellip;');

      const payload = JSON.stringify({
        wallet_address: address,
        group_id: groupId,
        tg_user_id: tgUserId,
        provider: found.name,
        verified_at: Date.now()
      });

      if (tg?.sendData) {
        tg.sendData(payload);
        setStatus('&#x2705; Wallet submitted! Returning to Telegram&hellip;');
        tg.close();
      } else {
        navigator.clipboard?.writeText(payload);
        setStatus('&#x2705; Verified (debug mode &mdash; payload copied to clipboard).');
      }
    }

    // ---------- Auto-start on page load ----------
    function handleError(err) {
      setStatus(`&#x274C; Error: ${err?.message || err}`);
      showRetry();
    }

    retryBtn.addEventListener('click', () => verify().catch(handleError));
    verify().catch(handleError);
  </script>
</body>
</html>
