<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GuildSafe Wallet Verify</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22c55e;
      --accent2: #0ea5e9;
      --danger: #ef4444;
      --border: #334155;
    }
    body {
      margin: 0;
      padding: 18px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, Arial, sans-serif;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    h2 { margin: 0 0 8px 0; font-size: 20px; }
    p { margin: 8px 0; color: var(--muted); }
    .row { display: grid; gap: 10px; margin-top: 12px; }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      background: #0f172a;
      color: var(--text);
    }
    textarea { min-height: 80px; resize: vertical; font-family: ui-monospace, monospace; }
    button {
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-connect { background: var(--accent2); color: #062033; }
    .btn-sign { background: #f59e0b; color: #2a1600; }
    .btn-submit { background: var(--accent); color: #052e16; }
    .btn-danger { background: var(--danger); color: #2b0808; }
    .pill {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #1f2937;
      border: 1px solid var(--border);
      display: inline-block;
      margin-right: 8px;
    }
    .small { font-size: 12px; color: var(--muted); }
    code { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="card">
    <h2>GuildSafe Wallet Verification</h2>
    <p>Connect your Sui wallet, sign the verification challenge, then submit.</p>

    <div>
      <span class="pill" id="ctxGroup">group: -</span>
      <span class="pill" id="ctxUser">user: -</span>
    </div>

    <div class="row">
      <input id="walletAddress" placeholder="Wallet address (0x...)" readonly />
      <button class="btn-connect" id="connectBtn">1) Connect Wallet</button>

      <textarea id="challengeBox" readonly placeholder="Challenge will appear here..."></textarea>
      <button class="btn-sign" id="signBtn">2) Sign Challenge</button>

      <textarea id="sigBox" readonly placeholder="Signature payload will appear here..."></textarea>
      <button class="btn-submit" id="submitBtn">3) Submit to Telegram Bot</button>

      <button class="btn-danger" id="resetBtn">Reset</button>
      <p class="small">
        If your wallet doesn't auto-inject, you can still paste an address manually in fallback mode.
      </p>
    </div>
  </div>

  <script>
    // ---------- Telegram context ----------
    const tg = window.Telegram?.WebApp || null;
    if (tg) tg.ready();

    const qs = new URLSearchParams(window.location.search);
    const groupId = qs.get('group_id') || '';
    const tgUserId = qs.get('tg_user_id') || '';

    document.getElementById('ctxGroup').textContent = `group: ${groupId || '-'}`;
    document.getElementById('ctxUser').textContent = `user: ${tgUserId || '-'}`;

    // ---------- State ----------
    let walletProvider = null;
    let providerName = null;
    let address = '';
    let challenge = '';
    let signaturePayload = null;

    const walletAddressEl = document.getElementById('walletAddress');
    const challengeEl = document.getElementById('challengeBox');
    const sigEl = document.getElementById('sigBox');

    // ---------- Helpers ----------
    const enc = new TextEncoder();

    function makeChallenge(addr) {
      const nonce = (crypto.randomUUID ? crypto.randomUUID() : String(Math.random()).slice(2));
      const ts = Date.now();
      return {
        nonce,
        ts,
        text:
`GuildSafe Wallet Verification
Group: ${groupId}
TelegramUser: ${tgUserId}
Wallet: ${addr}
Nonce: ${nonce}
Timestamp: ${ts}`
      };
    }

    function bytesToB64(bytes) {
      try {
        const arr = Array.from(bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes));
        return btoa(String.fromCharCode(...arr));
      } catch {
        return null;
      }
    }

    function normalizeSigResult(r) {
      // Handles shapes from different wallet implementations
      return {
        signature: r?.signature || r?.signatureBase64 || r?.signedMessage || null,
        bytes: r?.bytes || r?.messageBytes || null,
        publicKey: r?.publicKey || r?.pubKey || null,
        scheme: r?.signatureScheme || r?.scheme || null,
        raw: r
      };
    }

    function detectProvider() {
      // Try common injected Sui wallet shapes
      const candidates = [
        { name: 'slush', obj: window.slush?.sui || window.slush },
        { name: 'suiWallet', obj: window.suiWallet },
        { name: 'sui', obj: window.sui },
        { name: 'martian', obj: window.martian?.sui || window.martian },
        { name: 'ethos', obj: window.ethos?.sui || window.ethos },
      ].filter(c => !!c.obj);

      if (!candidates.length) return null;
      return candidates[0];
    }

    function isValidSuiAddress(a) {
      return /^0x[0-9a-fA-F]{40,64}$/.test((a || '').trim());
    }

    async function connectWallet() {
      const found = detectProvider();
      if (!found) {
        alert('No injected Sui wallet found. Open this page from Telegram inside a wallet-enabled environment.');
        return;
      }

      walletProvider = found.obj;
      providerName = found.name;

      // Try multiple method names
      if (typeof walletProvider.connect === 'function') {
        await walletProvider.connect();
      }

      let addr = null;
      if (typeof walletProvider.getAccounts === 'function') {
        const accts = await walletProvider.getAccounts();
        addr = accts?.[0]?.address || accts?.[0];
      }
      if (!addr && Array.isArray(walletProvider.accounts)) {
        addr = walletProvider.accounts?.[0]?.address || walletProvider.accounts?.[0];
      }
      if (!addr && typeof walletProvider.account === 'string') {
        addr = walletProvider.account;
      }

      if (!addr || !isValidSuiAddress(addr)) {
        alert('Connected wallet did not provide a valid Sui address.');
        return;
      }

      address = String(addr).trim();
      walletAddressEl.value = address;

      const c = makeChallenge(address);
      challenge = c.text;
      challengeEl.value = challenge;
      signaturePayload = null;
      sigEl.value = '';
    }

    async function signChallenge() {
      if (!walletProvider || !address || !challenge) {
        alert('Connect wallet first.');
        return;
      }

      let res = null;
      const msgBytes = enc.encode(challenge);

      if (typeof walletProvider.signPersonalMessage === 'function') {
        res = await walletProvider.signPersonalMessage({ message: msgBytes });
      } else if (typeof walletProvider.signMessage === 'function') {
        // Some providers expect string
        res = await walletProvider.signMessage({ message: challenge });
      } else {
        alert('This wallet does not support message signing via available APIs.');
        return;
      }

      const norm = normalizeSigResult(res);

      signaturePayload = {
        wallet_address: address,
        group_id: groupId,
        tg_user_id: tgUserId,
        provider: providerName,
        challenge,
        signature: norm.signature || null,
        signature_bytes_b64: norm.bytes ? bytesToB64(norm.bytes) : null,
        public_key: norm.publicKey || null,
        signature_scheme: norm.scheme || null,
        signed_at: Date.now()
      };

      sigEl.value = JSON.stringify(signaturePayload, null, 2);
    }

    function submitToTelegram() {
      if (!signaturePayload) {
        alert('Sign the challenge first.');
        return;
      }

      const payload = JSON.stringify(signaturePayload);

      if (tg?.sendData) {
        tg.sendData(payload);
        tg.close();
      } else {
        // Debug fallback for non-Telegram browser
        navigator.clipboard?.writeText(payload);
        alert('Not in Telegram WebApp. Payload copied to clipboard for debugging.');
      }
    }

    function resetAll() {
      walletProvider = null;
      providerName = null;
      address = '';
      challenge = '';
      signaturePayload = null;
      walletAddressEl.value = '';
      challengeEl.value = '';
      sigEl.value = '';
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      try { await connectWallet(); } catch (e) { alert(`Connect failed: ${e?.message || e}`); }
    });

    document.getElementById('signBtn').addEventListener('click', async () => {
      try { await signChallenge(); } catch (e) { alert(`Sign failed: ${e?.message || e}`); }
    });

    document.getElementById('submitBtn').addEventListener('click', submitToTelegram);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
  </script>
</body>
</html>
