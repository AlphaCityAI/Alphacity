<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GuildSafe Wallet Verify</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --accent: #22c55e;
      --accent2: #0ea5e9;
      --border: #334155;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Wallet-picker overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: min(400px, 92vw);
      max-height: 80vh;
      overflow-y: auto;
    }
    #modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    #modal .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 18px; }

    .wallet-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      background: #1e2a3a;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.15s, border-color 0.15s;
    }
    .wallet-btn:hover { background: #243348; border-color: var(--accent2); }
    .wallet-btn img { width: 32px; height: 32px; border-radius: 6px; }
    .wallet-icon-placeholder {
      width: 32px; height: 32px;
      background: #1a3a5c;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ── Status area (replaces overlay after wallet chosen) ── */
    #status {
      display: none;
      text-align: center;
      padding: 32px 24px;
      max-width: 380px;
    }
    .status-icon { font-size: 52px; margin-bottom: 14px; }
    .status-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .status-msg { color: var(--muted); font-size: 14px; line-height: 1.5; }
    .retry-btn {
      margin-top: 20px;
      padding: 10px 28px;
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .retry-btn:hover { opacity: 0.9; }

    /* ── Spinner ── */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Wallet picker – shown immediately on load -->
  <div id="overlay">
    <div id="modal">
      <h2>Connect Sui Wallet</h2>
      <p class="subtitle">Select your wallet to verify token holdings</p>
      <div id="wallet-list">
        <div class="spinner" style="margin: 24px auto;"></div>
      </div>
    </div>
  </div>

  <!-- Status feedback – shown after a wallet is chosen -->
  <div id="status"></div>

  <script>
    // ── Telegram context ──────────────────────────────────────────────────────
    const tg = window.Telegram?.WebApp || null;
    if (tg) tg.ready();

    const qs      = new URLSearchParams(window.location.search);
    const groupId  = qs.get('group_id')   || '';
    const tgUserId = qs.get('tg_user_id') || '';

    const enc = new TextEncoder();

    // ── Helpers ───────────────────────────────────────────────────────────────
    function makeChallenge(addr) {
      const nonce = crypto.randomUUID ? crypto.randomUUID() : String(Math.random()).slice(2);
      const ts    = Date.now();
      return {
        nonce, ts,
        text: `GuildSafe Wallet Verification\nGroup: ${groupId}\nTelegramUser: ${tgUserId}\nWallet: ${addr}\nNonce: ${nonce}\nTimestamp: ${ts}`
      };
    }

    function bytesToB64(bytes) {
      try {
        const arr = Array.from(bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes));
        return btoa(String.fromCharCode(...arr));
      } catch { return null; }
    }

    function isValidSuiAddress(a) {
      return /^0x[0-9a-fA-F]{40,64}$/.test((a || '').trim());
    }

    // ── Status helpers ────────────────────────────────────────────────────────
    function showStatus(html) {
      document.getElementById('overlay').style.display = 'none';
      const el = document.getElementById('status');
      el.style.display = 'block';
      el.innerHTML = html;
    }

    function statusSpinner(title, sub) {
      showStatus(`<div class="spinner"></div><div class="status-title">${title}</div>${sub ? `<div class="status-msg">${sub}</div>` : ''}`);
    }

    // ── Wallet discovery ──────────────────────────────────────────────────────
    // Checks the Wallet Standard registry then falls back to legacy globals.
    function discoverWallets() {
      const found = [];
      const seen  = new Set();

      // Check legacy injected globals – covers Slush, Sui Wallet, Martian, Ethos, etc.
      const legacy = [
        { name: 'Slush',      key: 'slush',      sub: 'sui' },
        { name: 'Sui Wallet', key: 'suiWallet',   sub: null  },
        { name: 'Sui',        key: 'sui',         sub: null  },
        { name: 'Martian',    key: 'martian',     sub: 'sui' },
        { name: 'Ethos',      key: 'ethos',       sub: 'sui' },
      ];
      for (const l of legacy) {
        if (seen.has(l.name)) continue;
        const obj = (l.sub ? window[l.key]?.[l.sub] : null) || window[l.key];
        if (obj) {
          seen.add(l.name);
          found.push({ name: l.name, icon: null, wallet: obj, type: 'legacy' });
        }
      }

      return found;
    }

    // ── Connect → Sign → Submit ───────────────────────────────────────────────
    async function handleWalletSelect(entry) {
      statusSpinner('Connecting…');

      try {
        const w = entry.wallet;

        if (typeof w.connect === 'function') await w.connect();

        let accts = null;
        if (typeof w.getAccounts === 'function') accts = await w.getAccounts();
        else if (Array.isArray(w.accounts))       accts = w.accounts;

        const address = accts?.[0]?.address || accts?.[0] || w.account || null;
        if (!address) throw new Error('Could not retrieve wallet address.');
        if (!isValidSuiAddress(address)) throw new Error('Wallet returned an invalid Sui address.');

        statusSpinner('Signing…', 'Please approve the request in your wallet');

        const c       = makeChallenge(address);
        const msgBytes = enc.encode(c.text);
        let res;

        if (typeof w.signPersonalMessage === 'function') {
          res = await w.signPersonalMessage({ message: msgBytes });
        } else if (typeof w.signMessage === 'function') {
          res = await w.signMessage({ message: c.text });
        } else {
          throw new Error('Wallet does not support message signing.');
        }

        const payload = JSON.stringify({
          wallet_address:      address,
          group_id:            groupId,
          tg_user_id:          tgUserId,
          provider:            entry.name,
          challenge:           c.text,
          signature:           res?.signature || res?.signatureBase64 || null,
          signature_bytes_b64: res?.bytes ? bytesToB64(res.bytes) : null,
          public_key:          res?.publicKey || res?.pubKey || null,
          signature_scheme:    res?.signatureScheme || res?.scheme || null,
          signed_at:           Date.now()
        });

        showStatus('<div class="status-icon">✅</div><div class="status-title">Verified!</div><div class="status-msg">Sending to bot…</div>');

        if (tg?.sendData) {
          tg.sendData(payload);
          tg.close();
        } else {
          // Debug fallback – not running inside Telegram
          const copied = await navigator.clipboard?.writeText(payload).then(() => true).catch(() => false);
          const note = copied
            ? 'Payload copied to clipboard.'
            : 'Could not copy payload to clipboard – check browser permissions.';
          showStatus(`<div class="status-icon">✅</div><div class="status-title">Done (debug)</div><div class="status-msg">${note}<br>This page is not running inside Telegram.</div>`);
        }

      } catch (e) {
        showStatus(`<div class="status-icon">❌</div><div class="status-title">Error</div><div class="status-msg">${e?.message || String(e)}</div><button class="retry-btn" onclick="location.reload()">Try Again</button>`);
      }
    }

    // ── Render wallet list ────────────────────────────────────────────────────
    function renderWalletList(wallets) {
      const container = document.getElementById('wallet-list');
      if (!wallets.length) {
        container.innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:12px 0;">No Sui wallets detected.<br>Install a Sui wallet extension and try again.</p>';
        return;
      }
      container.innerHTML = '';
      for (const entry of wallets) {
        const btn  = document.createElement('button');
        btn.className = 'wallet-btn';
        const icon = entry.icon
          ? `<img src="${entry.icon}" alt="${entry.name}" />`
          : `<span class="wallet-icon-placeholder">💎</span>`;
        btn.innerHTML = `${icon}<span>${entry.name}</span>`;
        btn.addEventListener('click', () => handleWalletSelect(entry));
        container.appendChild(btn);
      }
    }

    // ── Init: discover wallets and show picker immediately ────────────────────
    (function init() {
      // 300 ms lets wallet extensions finish injecting their globals before we scan
      setTimeout(function () {
        const wallets = discoverWallets();
        renderWalletList(wallets);

        // If exactly one wallet is already available, skip the picker entirely
        if (wallets.length === 1) {
          handleWalletSelect(wallets[0]);
        }
      }, 300);
    })();
  </script>
</body>
</html>
